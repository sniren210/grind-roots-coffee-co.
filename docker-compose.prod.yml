name: grind-roots-coffee
services:
  app:
    image: ${FULL_IMAGE:-grind-roots-coffee:latest}
    platform: linux/amd64
    container_name: grind-roots
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - grind-net

networks:
  grind-net:
    driver: bridge
